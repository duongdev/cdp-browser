# t006 spike — minimal nginx front to surface the SSE-buffering risk.
# Run:  nginx -p $PWD/spike/web-proxy -c nginx.conf  (then hit http://localhost:8080/)
# The proxy itself must already be running on :7800.

worker_processes 1;
events { worker_connections 64; }

http {
  # HTTP/2 needs TLS in real deploy; for the spike plain h1.1 is enough to prove
  # buffering behaviour. The one connection held open is the SSE stream.
  server {
    listen 8080;

    location /events {
      proxy_pass http://127.0.0.1:7800;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      # The whole point: without these, nginx buffers the event-stream and the
      # browser receives frames in stalled bursts instead of live.
      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding on;
      proxy_read_timeout 1h;
    }

    location / {
      proxy_pass http://127.0.0.1:7800;
      proxy_http_version 1.1;
    }
  }
}
