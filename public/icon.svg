  <rect x="224" y="224" width="480" height="480" rx="88" ry="88" fill="none" stroke="#ffffff" stroke-width="56"></rect>

  
  <rect x="384" y="384" width="480" height="480" rx="88" ry="88" fill="#ffffff"></rect>

  
  <circle cx="624" cy="624" r="56" fill="#3B82F6"></circle>
